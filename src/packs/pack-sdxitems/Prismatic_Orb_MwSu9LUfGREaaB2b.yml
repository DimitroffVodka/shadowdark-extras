  itemacro:
    macro:
      name: Prismatic Orb
      type: script
      scope: global
      command: >-
        // Concussive Orb - Energy Spell

        // Trigger: onSuccess (also enable onCritical for critical hits)

        // Deals 3d8 damage of chosen energy type (fire, cold, or electricity)

        // Double damage if anathema to target


        if (!token) {
            ui.notifications.warn("Caster token not found!");
            return;
        }


        const isCritical = args.isCritical || false;

        const targets = Array.from(game.user.targets);


        if (targets.length === 0) {
            ui.notifications.warn("Please target a creature first!");
            return;
        }


        // Create dialog for energy type selection

        const dialogContent = `
            <form>
                <div class="form-group">
                    <label><strong>Energy Type:</strong></label>
                    <select id="energy-type" style="width: 100%; margin-bottom: 10px;">
                        <option value="fire">🔥 Fire</option>
                        <option value="cold">❄️ Cold</option>
                        <option value="electricity">⚡ Electricity</option>
                    </select>
                </div>
                <div class="form-group" style="margin-top: 10px;">
                    <label style="display: flex; align-items: center; gap: 8px;">
                        <input type="checkbox" id="is-anathema" />
                        <span><strong>Anathema</strong> (double damage)</span>
                    </label>
                    <p style="color: #ff9900; font-size: 11px; margin: 4px 0 0 24px; font-style: italic;">
                        ⚠️ Ask the Game Master before selecting this option!
                    </p>
                </div>
            </form>
        `;


        const result = await Dialog.wait({
            title: "Prismatic Orb",
            content: dialogContent,
            buttons: {
                cast: {
                    icon: '<i class="fas fa-magic"></i>',
                    label: "Cast",
                    callback: (html) => {
                        return {
                            energyType: html.find("#energy-type").val(),
                            isAnathema: html.find("#is-anathema").is(":checked")
                        };
                    }
                },
                cancel: {
                    icon: '<i class="fas fa-times"></i>',
                    label: "Cancel",
                    callback: () => null
                }
            },
            default: "cast",
            close: () => null
        });


        if (!result) return; // Cancelled


        const { energyType, isAnathema } = result;


        // Energy type display info

        const energyInfo = {
            fire: { icon: "🔥", color: "#ff6600", name: "Fire" },
            cold: { icon: "❄️", color: "#66ccff", name: "Cold" },
            electricity: { icon: "⚡", color: "#ffff66", name: "Electricity" }
        };

        const energy = energyInfo[energyType];


        // Play JB2A animation if available

        if (game.modules.get("sequencer")?.active) {
            const animations = {
                fire: "jb2a.scorching_ray.01.orange",
                cold: "jb2a.ray_of_frost.blue",
                electricity: "jb2a.chain_lightning.primary.blue"
            };

            for (const target of targets) {
                new Sequence()
                    .effect()
                    .file(animations[energyType])
                    .atLocation(token)
                    .stretchTo(target)
                    .play();
            }
        }


        // Roll base damage

        const damageRoll = await new Roll("3d8").evaluate();

        let totalDamage = damageRoll.total;


        // Critical doubles (Shadowdark handles this, but just in case)

        if (isCritical) {
            totalDamage *= 2;
        }


        // Anathema doubles damage

        if (isAnathema) {
            totalDamage *= 2;
        }


        // Apply damage to each target

        const hitNames = [];

        for (const target of targets) {
            const targetActor = target.actor;
            if (!targetActor) continue;

            const currentHP = targetActor.system.attributes.hp.value;
            const newHP = Math.max(0, currentHP - totalDamage);
            await targetActor.update({ "system.attributes.hp.value": newHP });
            hitNames.push(target.name);
        }


        // Build damage breakdown text

        let damageBreakdown = `3d8 = ${damageRoll.total}`;

        if (isCritical) damageBreakdown += " × 2 (Critical)";

        if (isAnathema) damageBreakdown += " × 2 (Anathema)";

        damageBreakdown += ` = <b>${totalDamage}</b>`;


        // Determine effects text

        let effectsText = "";

        if (isCritical) effectsText += '<span style="color: #ff3333;">CRITICAL
        HIT!</span> ';

        if (isAnathema) effectsText += '<span style="color:
        #ffcc00;">ANATHEMA!</span>';


        // Create chat message

        ChatMessage.create({
            content: `
                <div style="border: 2px solid ${energy.color}; border-radius: 8px; padding: 8px; background: linear-gradient(135deg, #1a1a2a 0%, #2a2a4a 100%);">
                    <h3 style="color: ${energy.color}; margin: 0 0 4px 0;">${energy.icon} Prismatic Orb (${energy.name})</h3>
                    ${effectsText ? `<p style="margin: 4px 0;">${effectsText}</p>` : ""}
                    <p style="margin: 4px 0; color: #cccccc;">Damage: ${damageBreakdown} ${energyType}</p>
                    <p style="margin: 4px 0; color: #cccccc;">Hit: <b>${hitNames.join(", ")}</b></p>
                    <p style="font-size: 11px; color: #888888; margin: 8px 0 0 0; font-style: italic;">
                        A strobing orb of ${energyType} energy streaks toward the target, delivering a concussive blast!
                    </p>
                </div>
            `,
            speaker: speaker
        });


        ui.notifications.info(`Prismatic Orb dealt ${totalDamage} ${energyType}
        damage to ${hitNames.length} target(s)!`);
