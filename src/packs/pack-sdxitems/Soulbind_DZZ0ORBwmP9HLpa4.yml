name: Soulbind
system:
  description: >-
    <p>You seal the soul of a living creature, preventing magic from leeching
    into it.</p><p>One creature you touch becomes nearly impervious to all
    magic. For the spell's duration, all other spells targeting the creature
    (harmful or helpful) are DC 18 to cast.</p><p>This spell ends as soon as the
    target is affected by another spell.</p><p><strong>Automated:</strong> The
    effect is applied automatically. The DC 18 restriction and spell ending
    condition must be enforced manually by the
    GM.</p><p>@UUID[Compendium.shadowdark.spell-effects.Item.z7X1jRQHFTnSXpds]{Spell
    Effect: Soulbind}</p>
