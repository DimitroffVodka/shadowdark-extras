  itemacro:
    macro:
      name: Cloud Kill
      type: script
      scope: global
      command: |-
        // Cloud Kill - Damage at Turn Start, Death at Turn End
        if (args.trigger === "turnStart") {
            // Deal poison damage at turn start
            const roll = await new Roll("2d6").evaluate();
            const damage = roll.total;
            
            const currentHp = actor?.system?.attributes?.hp?.value ?? 0;
            const newHp = Math.max(0, currentHp - damage);
            await actor.update({"system.attributes.hp.value": newHp});
            
            ChatMessage.create({
                content: `<div class="shadowdark chat-card"><h3>☠️ Cloud Kill</h3><p><strong>${token.name}</strong> takes <strong>${damage}</strong> poison damage from the toxic cloud!</p></div>`
            });
        }

        if (args.trigger === "turnEnd") {
            // Kill LV 9 or less at turn end
            const level = actor?.system?.level?.value ?? actor?.system?.level ?? 99;
            
            if (level <= 9 && (actor?.system?.attributes?.hp?.value ?? 0) > 0) {
                await actor.update({"system.attributes.hp.value": 0});
                
                ChatMessage.create({
                    content: `<div class="shadowdark chat-card"><h3>💀 Cloud Kill</h3><p><strong>${token.name}</strong> (Level ${level}) succumbs to the deadly poison!</p></div>`
                });
            }
        }
