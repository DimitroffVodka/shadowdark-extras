  itemacro:
    macro:
      name: Diminish
      type: script
      scope: global
      command: |-
        // Diminish Potion Macro
        // Requires: Tagger module
        // Trigger: onCast (or onSuccess for spells)

        if (!token) {
            ui.notifications.warn("No token found for the drinker!");
            return;
        }

        // Check if Tagger module is available
        if (!game.modules.get("tagger")?.active) {
            ui.notifications.error("Tagger module is required for this potion!");
            return;
        }

        const tags = Tagger.getTags(token);
        const isEnlarged = tags.includes("Enlarged");
        const isDiminished = tags.includes("Diminished");

        if (isDiminished) {
            ui.notifications.warn(`${token.name} is already diminished!`);
            return;
        }

        let currentWidth = token.document.width;
        let currentHeight = token.document.height;
        let newWidth, newHeight;

        if (isEnlarged) {
            // If enlarged, remove the tag and decrease size by 1 (returning to base)
            newWidth = currentWidth - 1;
            newHeight = currentHeight - 1;
            await Tagger.removeTags(token, ["Enlarged"]);
            ui.notifications.info(`${token.name} is no longer enlarged.`);
        } else {
            // If not enlarged (and not diminished), add diminished tag and decrease size by 0.5
            newWidth = currentWidth - 0.5;
            newHeight = currentHeight - 0.5;
            await Tagger.addTags(token, ["Diminished"]);
            ui.notifications.info(`${token.name} shrank to size ${newWidth}x${newHeight}!`);
        }

        // Minimum size cap at 0.5
        if (newWidth < 0.5) newWidth = 0.5;
        if (newHeight < 0.5) newHeight = 0.5;

        // Update token size
        await token.document.update({
            width: newWidth,
            height: newHeight
        });

        // Optional: Create chat message
        ChatMessage.create({
            content: `<b>${token.name}</b> drinks the Diminish Potion and becomes smaller!`,
            speaker: ChatMessage.getSpeaker({ token: token })
        });
