  itemacro:
    macro:
      name: Identify
      type: script
      scope: global
      command: >-
        // Identify

        const targetToken = (typeof target !== "undefined" && target) ? target :
        game.user.targets.first();

        const targetActor = targetToken?.actor || item.actor;


        const sdxModule = game.modules.get("shadowdark-extras");


        const unidentifiedItems = targetActor.items.filter(i => 
            sdxModule.api.isUnidentified(i)
        );


        if (unidentifiedItems.length === 0) {
            ui.notifications.warn(game.i18n.localize("SHADOWDARK_EXTRAS.identify.noItems"));
            return;
        }


        const userId = (typeof originatingUserId !== "undefined") ?
        originatingUserId : undefined;

        await sdxModule.api.showIdentifyDialog(targetActor, unidentifiedItems,
        item, userId);
