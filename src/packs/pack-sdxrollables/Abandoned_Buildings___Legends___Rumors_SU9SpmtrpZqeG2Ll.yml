      - 14
    drawn: false
    description: >-
      The original architect's plans for the building don't match its current
      layout at all — not due to alterations, but because there are rooms in the
      structure that clearly exist but do not appear on any draft ever filed
      with the city.
    _id: WO7ASTmda2xnT5qt
