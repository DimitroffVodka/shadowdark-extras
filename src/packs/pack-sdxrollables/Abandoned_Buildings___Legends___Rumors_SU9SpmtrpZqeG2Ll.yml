      - 3
    drawn: false
    description: >-
      The building was purchased legitimately, deeded properly, taxed faithfully
      — and then simply abandoned one morning with the breakfast dishes still on
      the table. The owner was never found. The investigators assigned to the
      case resigned within a week.
    _id: YWWZknn7GqdxrHZp
