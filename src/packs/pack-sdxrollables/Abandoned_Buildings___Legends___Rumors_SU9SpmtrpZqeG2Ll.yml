      - 10
    drawn: false
    description: >-
      Locals swear the building is taller at night than during the day. Not by
      much. But by exactly one storey — a floor that can apparently only be
      reached after sundown, from the inside.
    _id: UNyl4ymQpbKl4wj7
    name: ''
    img: null
    flags: {}
