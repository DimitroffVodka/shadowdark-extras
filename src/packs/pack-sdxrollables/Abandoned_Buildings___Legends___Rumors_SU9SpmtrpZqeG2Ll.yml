      - 18
    drawn: false
    description: >-
      The ivy covering the eastern wall grows in flat denial of seasonal change
      — green in winter, apparently dormant in summer — and has been doing so
      for as long as anyone can recall. A druid examined it once and left the
      city the following week.
    _id: kHGaKWDHndELnB82
