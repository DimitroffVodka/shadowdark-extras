  - type: text
    weight: 1
    range:
      - 7
      - 7
    drawn: false
    description: >-
      It was once used as a waystation for a covert courier network that moved
      information between factions that were officially at war. The dead drops
      were built into the structure itself. Some of them are probably still
      active.
    _id: juIGVlIxeBcwl06t
    name: ''
    img: null
    flags: {}
    _stats:
