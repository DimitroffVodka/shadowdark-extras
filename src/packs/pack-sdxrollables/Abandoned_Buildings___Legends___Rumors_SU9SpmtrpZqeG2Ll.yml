  - type: text
    weight: 1
    range:
      - 8
      - 8
    drawn: false
    description: >-
      The well in the building's rear courtyard doesn't connect to the city's
      water system. Where it actually draws from, given the local geology, is
      something engineers who've looked at it describe as 'not possible, so I
      must have measured wrong.'
    _id: aAmD28pW3vDNnDuB
    name: ''
