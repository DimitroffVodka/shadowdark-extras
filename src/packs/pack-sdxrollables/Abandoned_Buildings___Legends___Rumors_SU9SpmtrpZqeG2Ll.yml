      - 11
    drawn: false
    description: >-
      The structure was a sanitarium for exactly three years before the city
      quietly shuttered it. The official records cite 'administrative reasons.'
      The former patients, most of whom recovered and left, refuse to discuss
      what happened in the final month.
    _id: PmA7iI8m2JA8jRBt
    name: ''
    img: null
