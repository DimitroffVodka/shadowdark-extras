      - 16
    drawn: false
    description: >-
      A minor but respected historian wrote that the building appears in city
      records predating any of the surrounding streets by roughly a century. Her
      colleagues challenged this; she died before the dispute was resolved.
    _id: 47KwTXMY9CCME7KD
    name: ''
    img: null
    flags: {}
