  - type: text
    weight: 1
    range:
      - 12
      - 12
    drawn: false
    description: >-
      A famous siege engineer once declared the building's foundations the most
      structurally sound she had ever assessed. She was baffled by this, given
      the state of everything above them, and left a footnote recommending
      'someone qualified in older disciplines' investigate further.
    _id: xKVN6aD0yHch9Pv8
    name: ''
    img: null
