      - 15
    drawn: false
    description: >-
      It is locally believed that saying the building's original name aloud
      after dark causes the speaker to dream of someone else's memories for
      three nights. Most locals have stopped using the name entirely. Some of
      the older ones won't say what it was.
    _id: 1BvK8dE3QMw32E8T
