      - 6
    drawn: false
    description: >-
      The building has been condemned eleven times over sixty years. Each
      condemnation order was revoked — once by city decree, once by court order,
      once because the inspector's notes were found replaced by a single pressed
      flower.
    _id: uHJ0O1rs3LH85uTU
    name: ''
    img: null
    flags: {}
