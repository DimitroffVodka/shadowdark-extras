  - type: text
    weight: 1
    range:
      - 17
      - 17
    drawn: false
    description: >-
      It is said the building was used to store something confiscated during the
      civil purges — not weapons or valuables, but documents. What those
      documents recorded, and who wanted them destroyed badly enough to seal
      them in a building instead of burning them, is unknown.
    _id: uDLtOYYB2SQi8CNr
    name: ''
    img: null
    flags: {}
