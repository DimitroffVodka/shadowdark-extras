      - 19
    drawn: false
    description: >-
      A previous owner tried to have the building demolished and found the crew
      unwilling to start after the first morning. They reported that every
      measurement reading was different from the one taken five minutes before,
      and that the walls seemed to be 'arguing back.'
    _id: svkMWVWMBtZriLlW
