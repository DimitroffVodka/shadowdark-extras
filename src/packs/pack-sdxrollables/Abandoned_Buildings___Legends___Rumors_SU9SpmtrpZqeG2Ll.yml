  - type: text
    weight: 1
    range:
      - 9
      - 9
    drawn: false
    description: >-
      A chronicler documenting the city's forgotten histories recorded that this
      building stands on the original site of the city's first execution ground.
      The chronicle was later officially retracted and is now quite difficult to
      find.
    _id: aJUqiQUjoM0NEI65
