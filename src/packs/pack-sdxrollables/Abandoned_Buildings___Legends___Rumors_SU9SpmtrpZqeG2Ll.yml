      - 13
    drawn: false
    description: >-
      Three generations of the same family of squatters have lived in and around
      the ruin across the years. Each generation is driven out by something they
      won't describe. Each generation returns within a year. The current family
      treats certain rooms as simply off-limits and has never explained why.
    _id: NV7GwrzkHTmiQAt1
    name: ''
    img: null
    flags: {}
    _stats:
