      - 4
    drawn: false
    description: >-
      A wealthy merchant used this place as a private counting house. He died in
      debt. His heirs insist the books were falsified and the real ledgers —
      showing where the money actually went — are still somewhere inside.
    _id: vsiHKLHjz7BcHWCJ
