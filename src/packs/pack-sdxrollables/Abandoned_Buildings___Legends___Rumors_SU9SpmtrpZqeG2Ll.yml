      - 5
    drawn: false
    description: >-
      The old guild that operated from this building was dissolved under
      mysterious circumstances. Their charter, their seal, and their accumulated
      records were supposedly destroyed. Three different parties are quietly
      looking for evidence that none of that happened.
    _id: 4g64vCVURAqVCXmo
    name: ''
    img: null
    flags: {}
