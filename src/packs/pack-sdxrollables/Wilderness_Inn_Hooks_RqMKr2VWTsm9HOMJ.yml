      - 1
    drawn: false
    description: >-
      The innkeeper explains that the road ahead 'closes at sundown' — not by
      any official authority, but because every traveler who has pushed on after
      dark in the past month has turned up back at the inn by morning, shaken
      and unable to explain how.
