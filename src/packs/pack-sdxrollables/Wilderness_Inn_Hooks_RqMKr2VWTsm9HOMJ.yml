    drawn: false
    description: >-
      A patrol of soldiers arrived at midday, requisitioned the inn's entire
      stock of preserved food, paid fairly, and left heading north. A second
      patrol arrived an hour later heading the same direction, also wanted
      provisions, and was confused to hear the first group had come through —
      they should have intercepted them on the road.
