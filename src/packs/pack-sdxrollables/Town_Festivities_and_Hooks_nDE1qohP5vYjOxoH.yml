  - type: text
    weight: 1
    range:
      - 14
      - 14
    drawn: false
    description: >-
      <strong>The Ghost Walk</strong><br /><em>Description:</em> On the last
      night of the autumn, citizens walk from burial site to burial site across
      town, leaving a lit candle at each grave of someone who died in the past
      year. The walk is conducted in near-silence. The route lengthens as the
      town ages. Afterward, everyone gathers for a meal in the town hall — the
      one night per year when the hall is open to all without invitation.<br
      /><em>Hook:</em> Three of the new graves on this year's walk are occupied
      by people nobody in town can account for. The deaths were recorded
      properly, the burial fees paid in coin — but no one remembers the
      funerals, and no mourners have come forward.
