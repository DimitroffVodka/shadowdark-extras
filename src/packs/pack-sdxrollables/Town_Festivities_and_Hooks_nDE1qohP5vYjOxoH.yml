  - type: text
    weight: 1
    range:
      - 12
      - 12
    drawn: false
    description: >-
      <strong>The Champions' Compact</strong><br /><em>Description:</em> Town
      champions selected by each quarter of the city compete in a series of
      non-lethal contests: lifting, riddle-solving, archery, negotiation, and a
      final event that changes each year. The winner's quarter earns first pick
      of market stalls for the following season. The day draws traders from
      surrounding areas and is one of the liveliest events of the year.<br
      /><em>Hook:</em> This year's final mysterious event has been announced as
      'locating a thing that has been hidden in plain sight for sixty years.'
      The champion who finds it keeps it. Several non-competitors have started
      searching early.
    _id: j73O7WRniXhpTtpe
