  - type: text
    weight: 1
    range:
      - 17
      - 17
    drawn: false
    description: >-
      <strong>The Iron Remembrance</strong><br /><em>Description:</em> Citizens
      wear a small iron nail pinned to their clothing for three days to
      commemorate a siege the town survived generations ago. On the final day,
      nails are hammered into the town wall — one per citizen — in a ceremony
      that has given one wall a surface like a hedgehog. The symbolism is
      persistence: the town bent but held. Ale is provided free from public
      funds and the speeches are mercifully short.<br /><em>Hook:</em> This
      year, several nails hammered into the wall fell out by morning — reversing
      the direction they were driven, lying on the ground pointing outward, away
      from the wall. The citizens who drove those particular nails are all
      refusing to speak about it.
    _id: PhUdgjEgv20kjxZf
