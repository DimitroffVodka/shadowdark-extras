  - type: text
    weight: 1
    range:
      - 13
      - 13
    drawn: false
    description: >-
      <strong>The Eve of Agreements</strong><br /><em>Description:</em> All
      contracts, debts, and long-standing business arrangements in the town are
      traditionally renewed or renegotiated on this date. The town scribe's
      office stays open all night, notary seals are at a discount, and the
      taverns are full of handshakes. Agreements made on this night are
      considered especially binding by local custom, and breaking them carries
      social consequences beyond any legal ones.<br /><em>Hook:</em> A
      significant contract renewed this year contains a small change from last
      year's version — a clause that dramatically shifts who owns a specific
      piece of land. The change is subtle enough that both signatories may not
      have noticed. Someone clearly intended them not to.
    _id: pDHaAFBbKkGw5FjU
