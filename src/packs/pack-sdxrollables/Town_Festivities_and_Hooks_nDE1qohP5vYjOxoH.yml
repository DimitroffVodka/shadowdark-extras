  - type: text
    weight: 1
    range:
      - 4
      - 4
    drawn: false
    description: >-
      <strong>The Festival of Borrowed Names</strong><br /><em>Description:</em>
      For one full day, every citizen draws a name from a communal pot and goes
      by that name until midnight, regardless of gender or status. Lord becomes
      laborer, cobbler becomes cleric — and all disputes or obligations made
      under a borrowed name are, by ancient tradition, considered null and void.
      The evening sees all names returned at a bonfire ceremony.<br
      /><em>Hook:</em> Someone used the cover of the festival to do something
      serious under a borrowed identity. The victim knows the borrowed name —
      but not the real one.
    _id: vCZfv63R3K1xrsox
    name: ''
