  - type: text
    weight: 1
    range:
      - 6
      - 6
    drawn: false
    description: >-
      <strong>The Grand Dispute</strong><br /><em>Description:</em> Every year,
      the town officially litigates a long-standing mock feud between two of its
      founding families. Neither family has believed in the feud for
      generations, but a judge, witnesses, and advocates are appointed,
      arguments are made with theatrical seriousness, and the 'victor' is feted
      at a lavish dinner paid for by the 'loser.' The cycle alternates win/loss
      each year.<br /><em>Hook:</em> This year both families are refusing to
      participate. Neither will say exactly why, but they've reportedly both
      hired the same discrete investigator.
    _id: Sdeii5yRRQT0cYYl
    name: ''
    img: icons/svg/d20-black.svg
