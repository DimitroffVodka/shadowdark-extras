  - type: text
    weight: 1
    range:
      - 7
      - 7
    drawn: false
    description: >-
      <strong>The Feast of the Empty Chair</strong><br /><em>Description:</em>
      Every table in every home sets an extra place at the evening meal — for
      the traveler who might need it. Strangers who knock on any door during the
      feast are welcomed, fed, and sent on their way with provisions. The
      tradition is strictly voluntary but near-universally observed. The town
      sees some of its highest foot traffic of the year.<br /><em>Hook:</em> One
      of this year's unexpected guests arrived already knowing the host's name,
      and the names of everyone at the table, before introductions were made.
    _id: EchHRo4XubJYUD0i
    name: ''
    img: icons/svg/d20-black.svg
