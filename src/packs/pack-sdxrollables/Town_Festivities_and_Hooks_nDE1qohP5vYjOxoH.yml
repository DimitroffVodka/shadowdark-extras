  - type: text
    weight: 1
    range:
      - 18
      - 18
    drawn: false
    description: >-
      <strong>The Feast of the Returning Road</strong><br
      /><em>Description:</em> This festival marks the traditional end of the
      dangerous-weather season when major roads were historically impassable. A
      single gate in the town wall is ceremonially reopened after being bolted
      for a symbolic winter, traders who overwinter in town are given an
      honorary 'road name,' and the first wagon to come through the gate is met
      with music and a shared meal at the crossroads.<br /><em>Hook:</em> The
      first wagon through the gate this year was already inside the walls — no
      one saw it enter, the gate was sealed, and the driver claims they've been
      on the road for three days from the south with no stop.
    _id: gFzxw3H8hXR4Cr7a
