  - type: text
    weight: 1
    range:
      - 3
      - 3
    drawn: false
    description: >-
      <strong>The Burning of the Hollow Man</strong><br /><em>Description:</em>
      A large wickerwork figure — the 'Hollow Man' — is built over several days
      by volunteers. Citizens write their regrets, bad debts, and petty grudges
      on scraps of paper and tuck them inside the figure. On the final evening
      it is set alight in the town square and the crowd watches their written
      grievances burn away, drinking spiced wine as the effigy collapses.<br
      /><em>Hook:</em> This year's Hollow Man was found pre-burned the night
      before the ceremony. Among the ash, a few scraps survived — and the
      readable fragments describe something that hasn't happened yet.
    _id: YEKTD4MGgxEJnkOk
    name: ''
