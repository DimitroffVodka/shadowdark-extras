name: Town Festivities and Hooks
formula: 1d20
results:
  - type: text
    weight: 1
    range:
      - 1
      - 1
    drawn: false
    description: >-
      <strong>The Night of Unlocked Doors</strong><br /><em>Description:</em>
      Once a year, every household in town leaves their front door unlocked from
      dusk to dawn as a gesture of communal trust. Candles are placed on every
      windowsill and a shared meal is left outside for strangers. The tradition
      dates to a famine long ago when neighbors fed one another through an
      open-door chain that lasted a winter.<br /><em>Hook:</em> By morning,
      something has entered one of the homes and left behind a gift no one can
      identify — elegant, valuable, and from nowhere anyone recognizes.
    _id: 9a9era0pyMlSDLZL
    name: ''
