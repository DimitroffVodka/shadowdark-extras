  - type: text
    weight: 1
    range:
      - 10
      - 10
    drawn: false
    description: >-
      <strong>The Night Market of Second Chances</strong><br
      /><em>Description:</em> One night per year, a market operates from
      midnight to dawn exclusively for goods people wish they'd never sold or
      given away. Sellers list items with their original story. Buyers must
      acknowledge the story before purchasing. There is no haggling — the seller
      names a price and it is accepted or rejected. The market has a reputation
      for reuniting people with things they thought were gone forever.<br
      /><em>Hook:</em> An item appeared at this year's market that the city's
      records list as having been destroyed in a fire forty years ago. The
      seller claims they found it 'on the road.' They arrived in town that
      afternoon and have no other belongings.
