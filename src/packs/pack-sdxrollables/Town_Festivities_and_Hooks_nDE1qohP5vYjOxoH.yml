  - type: text
    weight: 1
    range:
      - 16
      - 16
    drawn: false
    description: >-
      <strong>The Tide Blessing</strong><br /><em>Description:</em> At the
      highest tide of the year, the harbor's oldest boat is sailed to the harbor
      mouth by the most experienced remaining sailor in town. She anchors there
      at exactly high tide, stands in the bow, and speaks the traditional
      tide-blessing aloud. The words of the blessing are passed down only
      between outgoing and incoming bearers — they have never been written down.
      The ceremony is considered essential to the season's safety at sea.<br
      /><em>Hook:</em> The traditional bearer of the blessing died two weeks
      before the tide. She told no one the words. The tide is three days away,
      and every sailor in town is quietly terrified.
    _id: Gs15rCT5J8CZxmYp
    name: ''
