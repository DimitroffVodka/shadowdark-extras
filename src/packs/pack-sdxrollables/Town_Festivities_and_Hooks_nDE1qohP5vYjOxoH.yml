      - 2
    drawn: false
    description: >-
      <strong>The Salt Crown Festival</strong><br /><em>Description:</em>
      Fishermen and sailors crown a 'Salt King' or 'Salt Queen' from among the
      season's most successful crews. The crowned figure is carried through town
      on a chair made of driftwood and old rope, while the crowd throws dried
      sea-herbs and shouts old fishing chants. A feast of salted and fresh
      seafood follows, with the first toast traditionally poured into the
      harbor.<br /><em>Hook:</em> This year's Salt King disappeared between the
      crowning ceremony and the feast. His chair was found empty at the harbor's
      edge, his crown floating in the water below.
    _id: RO44GCSBZzZKLVwV
    name: ''
