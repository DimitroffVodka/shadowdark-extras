  - type: text
    weight: 1
    range:
      - 20
      - 20
    drawn: false
    description: >-
      <strong>The Wren's Procession</strong><br /><em>Description:</em> Children
      carry a caged wren in procession through every street in town, decorated
      with ribbons and accompanied by drums. At each corner, the procession
      stops and a verse is sung about the wren's 'great journey.' The wren is
      released at the town center at sunset in a ceremony considered to bring
      good fortune for the coming year. The bird is never harmed and always
      returns, according to tradition, within a day.<br /><em>Hook:</em> This
      year's wren was released as always — and did not fly. It sat on the
      release-post and stared at the town's eastern quarter for an hour before
      leaving, flying not south as tradition says it always does, but straight
      toward the old tower no one uses anymore.
    _id: v0xoczQHiIv5qRe6
