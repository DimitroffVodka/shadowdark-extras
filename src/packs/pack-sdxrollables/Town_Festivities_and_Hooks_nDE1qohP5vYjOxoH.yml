  - type: text
    weight: 1
    range:
      - 9
      - 9
    drawn: false
    description: >-
      <strong>The Painting of the Mill</strong><br /><em>Description:</em> Every
      five years, the entire town turns out to repaint the mill from top to
      bottom. The project takes three days, includes citizens of all ages, and
      by tradition, the miller's family is locked out of the building and kept
      occupied with a separate feast while everyone else works. The finished
      mill is unveiled at a ceremony where the miller pretends to be shocked.<br
      /><em>Hook:</em> During this year's painting, workers found a sealed room
      inside the mill that appears on none of the building's original plans, and
      that the miller's family insists has never existed.
    _id: Ni5WkixapDSvQor0
    name: ''
