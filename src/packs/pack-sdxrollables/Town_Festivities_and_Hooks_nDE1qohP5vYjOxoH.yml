  - type: text
    weight: 1
    range:
      - 8
      - 8
    drawn: false
    description: >-
      <strong>The Longest Step</strong><br /><em>Description:</em> A footrace
      that takes runners from the town's oldest building to its newest, touching
      the wall of each at the start and end. The route changes every year as
      buildings age and are added. The winner receives a deed signed by the
      mayor declaring them 'Furthest Foot of [Year]' — a worthless but deeply
      coveted honor. Betting on the race is the town's single largest commercial
      event.<br /><em>Hook:</em> This year's winner reached the finish line
      before anyone else despite not being seen at any point along the route.
      She insists she ran the whole way. The bookmaker who took the longest odds
      on her has vanished.
    _id: xwouGx0Br45ZjZiu
    name: ''
