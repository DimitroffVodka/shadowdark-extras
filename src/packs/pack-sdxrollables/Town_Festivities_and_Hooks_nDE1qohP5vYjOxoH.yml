  - type: text
    weight: 1
    range:
      - 15
      - 15
    drawn: false
    description: >-
      <strong>The Festival of Wrong Answers</strong><br /><em>Description:</em>
      A tongue-in-cheek scholarly festival where citizens compete to give the
      most creatively incorrect answer to a question posed by the town's senior
      academic. Previous winning wrong answers are recorded and displayed in the
      town archive. The event is aggressively defended by the academic community
      as 'essential to epistemological humility.' Most people just enjoy the
      absurdity.<br /><em>Hook:</em> This year's question was drawn from a
      sealed box that has been locked in the archive since the festival was
      founded. The question on the paper was written in a hand no archivist can
      identify — and one of the submitted 'wrong' answers appears to be exactly,
      verifiably correct.
    _id: aB2oPuauqtLyS98J
    name: ''
