  - type: text
    weight: 1
    range:
      - 19
      - 19
    drawn: false
    description: >-
      <strong>The Festival of Fixed Stars</strong><br /><em>Description:</em> An
      astronomical festival held when a particular star — locally named 'the
      Anchor' — rises at the exact center of the sky at midnight. The town's
      astronomers announce the date weeks in advance and citizens gather on the
      hill above town to observe it. Traditional star-charts are distributed and
      the night is considered one of the most auspicious of the year for making
      long-term decisions.<br /><em>Hook:</em> The Anchor star is not in its
      predicted position this year. It rose — but thirty degrees to the east of
      where it should be. The town's chief astronomer has locked herself in her
      observatory and is refusing to comment.
    _id: Tn1g63CApQjpQ4Kf
