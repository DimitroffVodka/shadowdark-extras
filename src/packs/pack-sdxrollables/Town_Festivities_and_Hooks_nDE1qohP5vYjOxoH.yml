  - type: text
    weight: 1
    range:
      - 11
      - 11
    drawn: false
    description: >-
      <strong>The Festival of Small Gods</strong><br /><em>Description:</em>
      Citizens build tiny shrines at every crossroad, doorstep and windowsill to
      honor 'small gods' — the spirits of hearth, threshold, well, and road.
      Each shrine receives a miniature offering of food, thread, or oil. By
      tradition, nothing large should be moved or repaired during the festival,
      out of respect for spirits who 'live in the joints of things.' The day is
      quiet, domestic, and deeply local.<br /><em>Hook:</em> One of the shrines
      has begun attracting insects, birds, and small animals in unusual numbers.
      By nightfall the animals are queuing. Whatever is in the shrine is
      receiving worship it should not, at its size, be capable of generating.
    _id: br45bfzxjvHlDtWm
