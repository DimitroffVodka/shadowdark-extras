  - type: text
    weight: 1
    range:
      - 5
      - 5
    drawn: false
    description: >-
      <strong>The Lantern Drift</strong><br /><em>Description:</em> Families
      build small paper boats fitted with a candle and a message to a deceased
      loved one. At nightfall, the boats are launched from the bridge into the
      river in a long, glowing procession. The tradition holds that if a boat
      reaches the mouth of the river still lit, the message was received. It is
      the town's most solemn and well-attended occasion.<br /><em>Hook:</em> One
      boat came back upstream carrying a message. Not the same message that was
      sent — a different one. The handwriting matches the deceased the sending
      family had hoped to reach.
    _id: B0BRDbSLfbh2hEvq
    name: ''
    img: icons/svg/d20-black.svg
    flags: {}
